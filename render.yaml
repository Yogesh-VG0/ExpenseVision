# render.yaml — Render Blueprint for ExpenseVision
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: expensevision
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node scripts/run-standalone.mjs
    healthCheckPath: /api/warmup
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true

  - type: cron
    name: expensevision-weekly-summary
    runtime: node
    schedule: "0 9 * * 1"
    buildCommand: echo "no build needed"
    startCommand: >-
      curl -s -X POST
      "$NEXT_PUBLIC_APP_URL/api/cron/weekly-summary"
      -H "Authorization: Bearer $CRON_SECRET"
      -H "Content-Type: application/json"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false
